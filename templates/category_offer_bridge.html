<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Link Category With Offer</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#ffffff;
    font-family:'Segoe UI',sans-serif;
}

/* Main Card */

.main-card{
    background:#ffffff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

/* Titles */

.page-title{
    font-size:26px;
    font-weight:600;
    margin-bottom:25px;
    color:#000;
}

.section-title{
    font-size:20px;
    font-weight:600;
    margin-top:30px;
    margin-bottom:15px;
    color:#000;
}

/* Form */

.form-select{
    height:45px;
}

.form-select:focus{
    border-color:#ff7a00;
    box-shadow:0 0 0 0.2rem rgba(255,122,0,0.2);
}

/* Button */

.btn-add{
    height:45px;
    width:120px;
    font-weight:500;
}

.btn-primary{
    background:#ff7a00;
    border:none;
}

.btn-primary:hover{
    background:#e66a00;
}

/* Table */

.table thead{
    background:#000000;
    color:white;
}

</style>
</head>


<body>

<div class="container mt-5">

<div class="main-card">

<div class="page-title">
Link Category With Offer
</div>

<form method="POST">
{% csrf_token %}

<div class="row align-items-end">

<div class="col-md-5">
<label class="form-label">Select Category</label>

<select class="form-select" name="category_id" required>
<option value="">Choose Category</option>

{% for c in category %}
<option value="{{c.id}}">{{c.name}}</option>
{% endfor %}

</select>
</div>


<div class="col-md-5">
<label class="form-label">Select Offer</label>

<select class="form-select" name="offer_id" required>
<option value="">Choose Offer</option>

{% for o in offer %}
<option value="{{o.id}}">{{o.title}}</option>
{% endfor %}

</select>
</div>


<div class="col-md-2">
<button class="btn btn-primary btn-add w-100">
Add
</button>
</div>

</div>

</form>


<hr class="mt-4">


<div class="section-title">
Category Offer List
</div>


<div class="table-responsive">

<table class="table table-bordered">

<thead>
<tr>
<th>ID</th>
<th>Category</th>
<th>Offer</th>
</tr>
</thead>

<tbody>

{% for b in bridges %}

<tr>
<td>{{b.id}}</td>
<td>{{b.category.name}}</td>
<td>{{b.offer.title}}</td>
</tr>

{% empty %}

<tr>
<td colspan="3" class="text-center">
No Data Found
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
