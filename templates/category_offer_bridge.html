<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Link Category With Offer</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f1ff;
    font-family:'Segoe UI',sans-serif;
    color:#1a1a1a;
}

/* ================= MAIN CARD ================= */

.main-card{
    background:rgba(255,255,255,0.75);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(12px);
    border:1px solid rgba(139,92,246,0.2);
    box-shadow:0 10px 30px rgba(139,92,246,0.15);
    transition:0.3s;
}

.main-card:hover{
    transform:translateY(-4px);
}

/* ================= TITLES ================= */

.page-title{
    font-size:26px;
    font-weight:700;
    margin-bottom:25px;
    color:#4c1d95;
}

.section-title{
    font-size:20px;
    font-weight:600;
    margin-top:30px;
    margin-bottom:15px;
    color:#6d28d9;
}

/* ================= FORM ================= */

.form-select{
    height:45px;
    border-radius:12px;
    border:1px solid #e0d4ff;
    background:#faf7ff;
}

.form-select:focus{
    border-color:#8b5cf6;
    box-shadow:0 0 0 0.2rem rgba(139,92,246,0.25);
    background:white;
}

/* ================= BUTTON ================= */

.btn-add{
    height:45px;
    width:120px;
    font-weight:600;
}

.btn-primary{
    background:linear-gradient(135deg,#7c3aed,#a855f7);
    border:none;
    box-shadow:0 5px 15px rgba(139,92,246,0.3);
}

.btn-primary:hover{
    background:linear-gradient(135deg,#6d28d9,#9333ea);
}

/* ================= TABLE ================= */

.table{
    border-radius:12px;
    overflow:hidden;
}

/* Header */
.table thead{
    background:linear-gradient(135deg,#4c1d95,#7c3aed);
    color:white;
}

/* Row hover */
.table tbody tr:hover{
    background:#f3e8ff;
}

/* Empty row */
.text-center{
    color:#6b7280;
    font-weight:500;
}

/* ================= HR ================= */

hr{
    border-color:#e9d5ff;
}

</style>
</head>


<body>

<div class="container mt-5">

<div class="main-card">

<div class="page-title">
Link Category With Offer
</div>

<form method="POST">
{% csrf_token %}

<div class="row align-items-end">

<div class="col-md-5">
<label class="form-label">Select Category</label>

<select class="form-select" name="category_id" required>
<option value="">Choose Category</option>

{% for c in category %}
<option value="{{c.id}}">{{c.name}}</option>
{% endfor %}

</select>
</div>


<div class="col-md-5">
<label class="form-label">Select Offer</label>

<select class="form-select" name="offer_id" required>
<option value="">Choose Offer</option>

{% for o in offer %}
<option value="{{o.id}}">{{o.title}}</option>
{% endfor %}

</select>
</div>


<div class="col-md-2">
<button class="btn btn-primary btn-add w-100">
Add
</button>
</div>

</div>

</form>


<hr class="mt-4">


<div class="section-title">
Category Offer List
</div>


<div class="table-responsive">

<table class="table table-bordered">

<thead>
<tr>
<th>ID</th>
<th>Category</th>
<th>Offer</th>
</tr>
</thead>

<tbody>

{% for b in bridges %}

<tr>
<td>{{b.id}}</td>
<td>{{b.category.name}}</td>
<td>{{b.offer.title}}</td>
</tr>

{% empty %}

<tr>
<td colspan="3" class="text-center">
No Data Found
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
