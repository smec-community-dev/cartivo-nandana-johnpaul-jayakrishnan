<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offer Discount Bridge</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f1ff;
font-family:'Segoe UI',sans-serif;
color:#1a1a1a;
}

/* ================= CONTAINER ================= */

.container-box{
background:rgba(255,255,255,0.75);
padding:30px;
border-radius:20px;
backdrop-filter:blur(12px);
border:1px solid rgba(139,92,246,0.2);
box-shadow:0 10px 30px rgba(139,92,246,0.15);
margin-top:40px;
transition:0.3s;
}

.container-box:hover{
transform:translateY(-4px);
}

/* ================= TITLE ================= */

.title{
font-weight:700;
margin-bottom:20px;
color:#4c1d95;
}

/* ================= BUTTON ================= */

.btn-primary{
background:linear-gradient(135deg,#7c3aed,#a855f7);
border:none;
box-shadow:0 5px 15px rgba(139,92,246,0.3);
}

.btn-primary:hover{
background:linear-gradient(135deg,#6d28d9,#9333ea);
}

/* ================= INPUT ================= */

.form-control{
border-radius:12px;
border:1px solid #e0d4ff;
background:#faf7ff;
}

.form-control:focus{
border-color:#8b5cf6;
box-shadow:0 0 0 0.2rem rgba(139,92,246,0.25);
background:white;
}

/* ================= TABLE ================= */

.table{
margin-top:30px;
border-radius:12px;
overflow:hidden;
}

/* Header */
.table-dark{
background:linear-gradient(135deg,#4c1d95,#7c3aed) !important;
color:#ffffff;
}

/* Row hover */
.table-hover tbody tr:hover{
background:#f3e8ff;
}

/* ================= TEXT ================= */

h5{
color:#6d28d9;
font-weight:600;
}

.text-center{
color:#6b7280;
}

/* ================= HR ================= */

hr{
border-color:#e9d5ff;
}

</style>
</head>

<body>

<div class="container">

<div class="container-box">

<h4 class="title">Link Offer With Discount</h4>

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-5">

<label class="form-label">Select Offer</label>

<select name="offer" class="form-control" required>

<option value="">Choose Offer</option>

{% for offer in offers %}

<option value="{{offer.id}}">
{{offer.title}}
</option>

{% endfor %}

</select>

</div>


<div class="col-md-5">

<label class="form-label">Select Discount</label>

<select name="discount" class="form-control" required>

<option value="">Choose Discount</option>

{% for discount in discounts %}

<option value="{{discount.id}}">
{{discount.name}} - {{discount.discount_value}}
</option>

{% endfor %}

</select>

</div>


<div class="col-md-2 d-flex align-items-end">

<button type="submit" class="btn btn-primary w-100">
Add
</button>

</div>

</div>

</form>


<hr>


<h5 class="mt-4">Offer Discount List</h5>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Offer</th>
<th>Discount</th>
</tr>

</thead>

<tbody>

{% for bridge in bridges %}

<tr>

<td>{{bridge.id}}</td>

<td>{{bridge.offer.title}}</td>

<td>{{bridge.discount.name}} ({{bridge.discount.discount_value}})</td>

</tr>

{% empty %}

<tr>
<td colspan="3" class="text-center">No Data Found</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>


<script>

document.querySelector("form").addEventListener("submit",function(){

alert("Offer and Discount Linked Successfully");

});

</script>


</body>
</html>
