<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Discount</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#ffffff;
    font-family:'Segoe UI',sans-serif;
}

/* Sidebar */

.sidebar{
    height:100vh;
    width:250px;
    background:#000000;
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar h4{
    font-weight:bold;
    color:#ff7a00;
}

.sidebar a{
    display:block;
    color:#dddddd;
    text-decoration:none;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#ff7a00;
    color:white;
}

/* Main Content */

.main-content{
    margin-left:270px;
    padding:40px;
    color:#000;
}

/* Card */

.card{
    border-radius:12px;
    background:#ffffff;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

/* Button */

.btn-primary{
    background:#ff7a00;
    border:none;
}

.btn-primary:hover{
    background:#e66a00;
}

/* Secondary Button */

.btn-secondary{
    background:#000000;
    border:none;
    color:#fff;
}

.btn-secondary:hover{
    background:#333333;
    color:#fff;
}

/* Input Focus */

.form-control:focus{
    border-color:#ff7a00;
    box-shadow:0 0 0 0.2rem rgba(255,122,0,0.2);
}

</style>
</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4 class="mb-4">CARTIVO</h4>

<a href="{% url 'admin_index' %}">
<i class="bi bi-house"></i> Infrastructure
</a>

<a href="{% url 'category' %}">
<i class="bi bi-grid"></i> Categories
</a>

<a href="{% url 'subcategory' %}">
<i class="bi bi-diagram-3"></i> Sub Categories
</a>

<a href="{% url 'offer_view' %}">
<i class="bi bi-gift"></i> Offer Management
</a>

<a href="{% url 'discount_view' %}" class="active">
<i class="bi bi-percent"></i> Manage Discount
</a>

<a href="{% url 'coupon_view' %}">
<i class="bi bi-ticket-perforated"></i> Coupon Management
</a>

</div>


<!-- Main Content -->

<div class="main-content">

<div class="container-fluid">

<div class="card p-4 shadow-sm">

<h3 class="mb-4">Add Discount</h3>

<form method="POST">

{% csrf_token %}

<!-- Discount Name -->
<div class="mb-3">
<label class="form-label">Discount Name</label>

<input type="text"
class="form-control"
name="name"
placeholder="Enter discount name"
required>

</div>


<!-- Discount Type -->
<div class="mb-3">

<label class="form-label">Discount Type</label>

<select class="form-control" name="discount_type" required>

<option value="">Select Discount Type</option>

<option value="PERCENTAGE">Percentage (%)</option>

<option value="FLAT">Flat Amount (₹)</option>

</select>

</div>


<!-- Discount Value -->
<div class="mb-3">

<label class="form-label">Discount Value</label>

<input type="number"
class="form-control"
name="discount_value"
placeholder="Enter value"
required>

</div>


<!-- Buttons -->
<button type="submit" class="btn btn-primary">
<i class="bi bi-save"></i> Save Discount
</button>

<a href="{% url 'discount_view' %}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</div>

</body>
</html>
