<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}Cartivo Admin{% endblock %}

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#ffffff;
    font-family:'Segoe UI',sans-serif;
}

/* Sidebar */

.sidebar{
    height:100vh;
    width:250px;
    background:#000;
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar h4{
    color:#ff7a00;
    font-weight:bold;
}

.sidebar a{
    display:block;
    color:#ddd;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    text-decoration:none;
}

.sidebar a:hover,
.sidebar a.active{
    background:#ff7a00;
    color:white;
}

/* Main */

.main-content{
    margin-left:270px;
    padding:40px;
    color:#000;
}

/* Card */

.card{
    border-radius:12px;
    background:#fff;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

/* Buttons */

.btn-primary{
    background:#ff7a00;
    border:none;
}

.btn-primary:hover{
    background:#e66a00;
}

.btn-secondary{
    background:#000;
    color:#fff;
    border:none;
}

.btn-secondary:hover{
    background:#333;
}

/* Inputs */

.form-control:focus,
.form-select:focus{
    border-color:#ff7a00;
    box-shadow:0 0 0 0.2rem rgba(255,122,0,0.2);
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4 class="mb-4">CARTIVO</h4>

<a href="{% url 'admin_index' %}">
<i class="bi bi-house"></i> Dashboard
</a>

<a href="{% url 'category' %}">
<i class="bi bi-grid"></i> Categories
</a>

<a href="{% url 'subcategory' %}">
<i class="bi bi-diagram-3"></i> Sub Categories
</a>

<a href="{% url 'offer_view' %}">
<i class="bi bi-gift"></i> Offers
</a>

<a href="{% url 'discount_view' %}">
<i class="bi bi-percent"></i> Discounts
</a>

<a href="{% url 'coupon_view' %}">
<i class="bi bi-ticket-perforated"></i> Coupons
</a>

</div>

<!-- Main Content -->

<div class="main-content">

{% block content %}
{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
