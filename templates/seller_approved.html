<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}Cartivo Admin{% endblock %}

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f4f1ff;
font-family:'Segoe UI',sans-serif;
color:#1a1a1a;
}

/* ================= SIDEBAR ================= */

.sidebar{
height:100vh;
width:250px;
background:linear-gradient(180deg,#1a0033,#3b0a75);
color:white;
position:fixed;
padding:20px;
}

.sidebar h4{
color:#c084fc;
font-weight:bold;
letter-spacing:1px;
}

/* Sidebar links */
.sidebar a{
display:block;
color:#d1c4ff;
padding:12px;
margin-bottom:10px;
border-radius:10px;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover,
.sidebar a.active{
background:linear-gradient(135deg,#7c3aed,#a855f7);
color:white;
transform:translateX(5px);
}

/* ================= MAIN ================= */

.main-content{
margin-left:270px;
padding:40px;
}

/* ================= CARD ================= */

.card{
border-radius:20px;
background:rgba(255,255,255,0.75);
backdrop-filter:blur(12px);
border:1px solid rgba(139,92,246,0.2);
box-shadow:0 10px 30px rgba(139,92,246,0.15);
}

/* ================= BUTTONS ================= */

.btn-primary{
background:linear-gradient(135deg,#7c3aed,#a855f7);
border:none;
box-shadow:0 5px 15px rgba(139,92,246,0.3);
}

.btn-primary:hover{
background:linear-gradient(135deg,#6d28d9,#9333ea);
}

/* Secondary */
.btn-secondary{
background:#ede9fe;
color:#4c1d95;
border:none;
}

.btn-secondary:hover{
background:#ddd6fe;
color:#4c1d95;
}

/* ================= INPUT ================= */

.form-control,
.form-select{
border-radius:12px;
border:1px solid #e0d4ff;
background:#faf7ff;
}

.form-control:focus,
.form-select:focus{
border-color:#8b5cf6;
box-shadow:0 0 0 0.2rem rgba(139,92,246,0.25);
background:white;
}

/* ================= TABLE ================= */

.table{
border-radius:12px;
overflow:hidden;
}

.table thead{
background:linear-gradient(135deg,#4c1d95,#7c3aed);
color:white;
}

.table-hover tbody tr:hover{
background:#f3e8ff;
}

/* ================= BADGE ================= */

.badge{
border-radius:8px;
padding:6px 10px;
font-size:12px;
}

/* ================= TEXT ================= */

h1,h2,h3,h4,h5{
color:#4c1d95;
font-weight:700;
}

.text-muted{
color:#6b7280 !important;
}

/* ================= SCROLLBAR (Optional premium) ================= */

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#a855f7;
border-radius:10px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4 class="mb-4">CARTIVO</h4>

<a href="{% url 'admin_index' %}"
class="flex items-center gap-4 bg-blue-800 text-white p-4 rounded-2xl font-bold text-sm">

<i class="fa-solid fa-grid-2"></i>
Infrastructure

</a>




<a href="{% url 'category' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-layer-group"></i>
ManageCategories

</a>


<a href="{% url 'subcategory' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-sitemap"></i>
Manage Sub Categories

</a>


<a href="{% url 'offer_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-tags"></i>
Manage Discount

</a>


<a href="{% url 'discount_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-percent"></i>
Manage coupon

</a>


<a href="{% url 'coupon_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-ticket"></i>
Manage Offer

</a>

<a href="{% url 'coupon_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-ticket"></i>
Offer Discount

</a>

<a href="{% url 'coupon_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">
<i class="fa-solid fa-ticket"></i>
Product Offer

</a>

<a href="{% url 'coupon_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-ticket"></i>
CategoryOffer

</a>

<a href="{% url 'coupon_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-ticket"></i>
Product Discount

</a>

<a href="{% url 'coupon_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-ticket"></i>
Seller Management

</a>
</div>

<!-- Main Content -->

<div class="main-content">

{% block content %}
{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
