<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Discount Bridge</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f1ff;
font-family:'Segoe UI',sans-serif;
color:#1a1a1a;
}

/* ================= CARD ================= */

.main-card{
background:rgba(255,255,255,0.75);
border-radius:20px;
padding:30px;
margin-top:50px;
backdrop-filter:blur(12px);
border:1px solid rgba(139,92,246,0.2);
box-shadow:0 10px 30px rgba(139,92,246,0.15);
transition:0.3s;
}

.main-card:hover{
transform:translateY(-4px);
}

/* ================= BUTTON ================= */

.btn-add{
width:120px;
}

.btn-primary{
background:linear-gradient(135deg,#7c3aed,#a855f7);
border:none;
box-shadow:0 5px 15px rgba(139,92,246,0.3);
}

.btn-primary:hover{
background:linear-gradient(135deg,#6d28d9,#9333ea);
}

/* ================= INPUT ================= */

.form-control{
border-radius:12px;
border:1px solid #e0d4ff;
background:#faf7ff;
}

.form-control:focus{
border-color:#8b5cf6;
box-shadow:0 0 0 0.2rem rgba(139,92,246,0.25);
background:white;
}

/* ================= TABLE ================= */

.table-section{
margin-top:40px;
}

.table{
border-radius:12px;
overflow:hidden;
}

/* Header */
.table-light{
background:linear-gradient(135deg,#4c1d95,#7c3aed) !important;
color:white;
}

/* Hover */
.table tbody tr:hover{
background:#f3e8ff;
}

/* ================= TEXT ================= */

h3{
color:#4c1d95;
font-weight:700;
}

h4{
color:#6d28d9;
font-weight:600;
}

.text-center{
color:#6b7280;
}

/* ================= HR ================= */

hr{
border-color:#e9d5ff;
}

</style>

</head>

<body>

<div class="container">

<div class="main-card">

<h3 class="mb-4">Link Product With Discount</h3>

<form method="POST">
{% csrf_token %}

<div class="row">

<div class="col-md-5">
<label class="form-label">Select Product</label>
<select class="form-control" name="product_id" required>
<option value="">Choose Product</option>

{% for p in product %}
<option value="{{p.id}}">{{p.product_name}}</option>
{% endfor %}

</select>
</div>


<div class="col-md-5">
<label class="form-label">Select Discount</label>
<select class="form-control" name="discount_id" required>
<option value="">Choose Discount</option>

{% for d in discount %}
<option value="{{d.id}}">{{d.discount_name}}</option>
{% endfor %}

</select>
</div>


<div class="col-md-2 d-flex align-items-end">
<button class="btn btn-primary btn-add" type="submit">Add</button>
</div>

</div>

</form>


<hr>


<div class="table-section">

<h4>Product Discount List</h4>

<table class="table table-bordered mt-3">

<thead class="table-light">
<tr>
<th>ID</th>
<th>Product</th>
<th>Discount</th>
</tr>
</thead>

<tbody>

{% for b in bridge %}
<tr>
<td>{{b.id}}</td>
<td>{{b.product.product_name}}</td>
<td>{{b.discount.discount_name}}</td>
</tr>
{% endfor %}

</tbody>

</table>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
