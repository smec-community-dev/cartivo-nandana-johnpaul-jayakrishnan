<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Discount Bridge</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#ffffff;
}

/* Main Card */

.main-card{
    background:#ffffff;
    border-radius:10px;
    padding:30px;
    margin-top:50px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

/* Button */

.btn-add{
    width:120px;
}

.btn-primary{
    background:#ff7a00;
    border:none;
}

.btn-primary:hover{
    background:#e66a00;
}

/* Table Section */

.table-section{
    margin-top:40px;
}

/* Table Header */

.table-light{
    background:#f5f5f5 !important;
}

/* Input Focus */

.form-control:focus{
    border-color:#ff7a00;
    box-shadow:0 0 0 0.2rem rgba(255,122,0,0.2);
}

</style>
</head>

<body>

<div class="container">

<div class="main-card">

<h3 class="mb-4">Link Product With Discount</h3>

<form method="POST">
{% csrf_token %}

<div class="row">

<div class="col-md-5">
<label class="form-label">Select Product</label>
<select class="form-control" name="product_id" required>
<option value="">Choose Product</option>

{% for p in product %}
<option value="{{p.id}}">{{p.product_name}}</option>
{% endfor %}

</select>
</div>


<div class="col-md-5">
<label class="form-label">Select Discount</label>
<select class="form-control" name="discount_id" required>
<option value="">Choose Discount</option>

{% for d in discount %}
<option value="{{d.id}}">{{d.discount_name}}</option>
{% endfor %}

</select>
</div>


<div class="col-md-2 d-flex align-items-end">
<button class="btn btn-primary btn-add" type="submit">Add</button>
</div>

</div>

</form>


<hr>


<div class="table-section">

<h4>Product Discount List</h4>

<table class="table table-bordered mt-3">

<thead class="table-light">
<tr>
<th>ID</th>
<th>Product</th>
<th>Discount</th>
</tr>
</thead>

<tbody>

{% for b in bridge %}
<tr>
<td>{{b.id}}</td>
<td>{{b.product.product_name}}</td>
<td>{{b.discount.discount_name}}</td>
</tr>
{% endfor %}

</tbody>

</table>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
