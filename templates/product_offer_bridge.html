<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Product Offer Bridge</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f1ff;
font-family:'Segoe UI',sans-serif;
color:#1a1a1a;
}

/* ================= CARD ================= */

.main-card{
background:rgba(255,255,255,0.75);
padding:30px;
border-radius:20px;
backdrop-filter:blur(12px);
border:1px solid rgba(139,92,246,0.2);
box-shadow:0 10px 30px rgba(139,92,246,0.15);
margin-top:40px;
transition:0.3s;
}

.main-card:hover{
transform:translateY(-4px);
}

/* ================= TITLE ================= */

.page-title{
font-weight:700;
margin-bottom:20px;
color:#4c1d95;
}

/* ================= BUTTON ================= */

.btn-primary{
background:linear-gradient(135deg,#7c3aed,#a855f7);
border:none;
box-shadow:0 5px 15px rgba(139,92,246,0.3);
}

.btn-primary:hover{
background:linear-gradient(135deg,#6d28d9,#9333ea);
}

/* ================= INPUT ================= */

.form-control{
border-radius:12px;
border:1px solid #e0d4ff;
background:#faf7ff;
}

.form-control:focus{
border-color:#8b5cf6;
box-shadow:0 0 0 0.2rem rgba(139,92,246,0.25);
background:white;
}

/* ================= TABLE ================= */

.table{
margin-top:30px;
border-radius:12px;
overflow:hidden;
}

/* Header */
.table-dark{
background:linear-gradient(135deg,#4c1d95,#7c3aed) !important;
color:#ffffff;
}

/* Hover */
.table-hover tbody tr:hover{
background:#f3e8ff;
}

/* ================= ALERT ================= */

.alert-success{
background:#ede9fe;
border:none;
color:#4c1d95;
}

/* ================= TEXT ================= */

h5{
color:#6d28d9;
font-weight:600;
}

.text-center{
color:#6b7280;
}

/* ================= HR ================= */

hr{
border-color:#e9d5ff;
}

</style>

</head>

<body>

<div class="container">

<div class="main-card">

<h4 class="page-title">Link Product With Offer</h4>

<!-- Django Messages -->

{% if messages %}
{% for message in messages %}

<div class="alert alert-success alert-dismissible fade show">
{{message}}
<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

{% endfor %}
{% endif %}

<!-- FORM START -->

<form method="POST" action="">

{% csrf_token %}

<div class="row">

<div class="col-md-5">

<label class="form-label">Select Product</label>

<select name="product" class="form-control" required>

<option value="">Choose Product</option>

{% for product in products %}

<option value="{{product.id}}">
{{product.name}}
</option>

{% endfor %}

</select>

</div>


<div class="col-md-5">

<label class="form-label">Select Offer</label>

<select name="offer" class="form-control" required>

<option value="">Choose Offer</option>

{% for offer in offers %}

<option value="{{offer.id}}">
{{offer.title}}
</option>

{% endfor %}

</select>

</div>


<div class="col-md-2 d-flex align-items-end">

<button type="submit" class="btn btn-primary w-100">
Add
</button>

</div>

</div>

</form>

<!-- FORM END -->


<hr>

<h5 class="mt-4">Product Offer List</h5>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Product</th>
<th>Offer</th>
</tr>

</thead>

<tbody>

{% for bridge in bridges %}

<tr>

<td>{{bridge.id}}</td>
<td>{{bridge.product.name}}</td>
<td>{{bridge.offer.title}}</td>

</tr>

{% empty %}

<tr>
<td colspan="3" class="text-center">No Data Found</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

document.querySelector("form").addEventListener("submit",function(){
console.log("Product Offer Linked");
});

</script>

</body>
</html>
