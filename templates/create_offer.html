{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Offer</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#ffffff;
    font-family:Segoe UI;
}

/* Sidebar */

.sidebar{
    height:100vh;
    width:250px;
    background:#000000;
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar h4{
    font-weight:bold;
    color:#ff7a00;
}

.sidebar a{
    display:block;
    color:#dddddd;
    text-decoration:none;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#ff7a00;
    color:white;
}

/* Main Content */

.main-content{
    margin-left:270px;
    padding:40px;
    color:#000;
}

/* Form Card */

.card-box{
    max-width:600px;
    border-radius:15px;
    background:#ffffff;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* Buttons */

.btn-primary{
    background:#ff7a00;
    border:none;
}

.btn-primary:hover{
    background:#e66a00;
}

/* Back Button (keep neutral but matching theme) */

.btn-secondary{
    background:#000000;
    border:none;
    color:#fff;
}

.btn-secondary:hover{
    background:#333333;
    color:#fff;
}

/* Input Focus */

.form-control:focus{
    border-color:#ff7a00;
    box-shadow:0 0 0 0.2rem rgba(255,122,0,0.2);
}

</style>
</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4 class="mb-4">CARTIVO</h4>

<a href="{% url 'admin_index' %}">
<i class="bi bi-house"></i> Infrastructure
</a>

<a href="{% url 'category' %}">
<i class="bi bi-grid"></i> Categories
</a>

<a href="{% url 'subcategory' %}">
<i class="bi bi-diagram-3"></i> Sub Categories
</a>

<a href="{% url 'offer_view' %}" class="active">
<i class="bi bi-gift"></i> Offer Management
</a>

<a href="{% url 'discount_view' %}">
<i class="bi bi-percent"></i> Manage Discount
</a>

<a href="{% url 'coupon_view' %}">
<i class="bi bi-ticket-perforated"></i> Coupon Management
</a>

</div>


<!-- Main Content -->

<div class="main-content">

<div class="card card-box p-4">

<h3 class="mb-4 text-center">Create New Offer</h3>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Offer Title</label>
<input type="text" name="title" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea name="description" class="form-control" rows="3"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Start Date</label>
<input type="date" name="start_date" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">End Date</label>
<input type="date" name="end_date" class="form-control" required>
</div>

<div class="d-flex justify-content-between">

<a href="{% url 'offer_view' %}" class="btn btn-secondary">
Back
</a>

<button type="submit" class="btn btn-primary">
Create Offer
</button>

</div>

</form>

</div>

</div>

</body>
</html>
