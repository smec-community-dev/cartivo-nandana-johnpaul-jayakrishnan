{% extends "user/base.html" %}

{% block title %}Edit Address | Cartivo{% endblock %}

{% block content %}
<main class="max-w-3xl mx-auto px-4 py-12">
  <div class="bg-white rounded-[2.5rem] border border-violet-100 shadow-xl shadow-violet-100/50 overflow-hidden">
    <div class="violet-gradient p-8 text-white">
      <h1 class="text-3xl font-extrabold">Edit Address</h1>
      <p class="text-violet-100/80 mt-2 font-medium">Update your delivery location details.</p>
    </div>

    <form method="POST" class="p-8 space-y-5">
      {% csrf_token %}

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Full Name</label>
          <input type="text" name="full_name" required value="{{ address.full_name }}"
                 class="w-full bg-slate-50 border-2 border-transparent focus:border-violet-400 focus:bg-white p-3.5 rounded-xl outline-none transition font-bold text-sm">
        </div>
        <div class="space-y-1">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Phone Number</label>
          <input type="text" name="phone_number" required value="{{ address.phone_number }}"
                 class="w-full bg-slate-50 border-2 border-transparent focus:border-violet-400 focus:bg-white p-3.5 rounded-xl outline-none transition font-bold text-sm">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">House info</label>
          <input type="text" name="house_info" required value="{{ address.house_info }}"
                 class="w-full bg-slate-50 border-2 border-transparent focus:border-violet-400 focus:bg-white p-3.5 rounded-xl outline-none transition font-bold text-sm">
        </div>
        <div class="space-y-1">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Street / Locality</label>
          <input type="text" name="locality" required value="{{ address.locality }}"
                 class="w-full bg-slate-50 border-2 border-transparent focus:border-violet-400 focus:bg-white p-3.5 rounded-xl outline-none transition font-bold text-sm">
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Landmark</label>
        <input type="text" name="landmark" value="{{ address.landmark }}"
               class="w-full bg-slate-50 border-2 border-transparent focus:border-violet-400 focus:bg-white p-3.5 rounded-xl outline-none transition font-bold text-sm">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">City</label>
          <input type="text" name="city" required value="{{ address.city }}"
                 class="w-full bg-slate-50 border-2 border-transparent focus:border-violet-400 focus:bg-white p-3.5 rounded-xl outline-none transition font-bold text-sm">
        </div>
        <div class="space-y-1">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">State</label>
          <input type="text" name="state" required value="{{ address.state }}"
                 class="w-full bg-slate-50 border-2 border-transparent focus:border-violet-400 focus:bg-white p-3.5 rounded-xl outline-none transition font-bold text-sm">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Country</label>
          <input type="text" name="country" required value="{{ address.country }}"
                 class="w-full bg-slate-50 border-2 border-transparent focus:border-violet-400 focus:bg-white p-3.5 rounded-xl outline-none transition font-bold text-sm">
        </div>
        <div class="space-y-1">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Pincode</label>
          <input type="text" name="pincode" required value="{{ address.pincode }}"
                 class="w-full bg-slate-50 border-2 border-transparent focus:border-violet-400 focus:bg-white p-3.5 rounded-xl outline-none transition font-bold text-sm">
        </div>
      </div>

      <div class="space-y-2">
        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Location Tag</label>
        <div class="flex gap-3">
          <label class="flex-1 cursor-pointer">
            <input type="radio" name="address_type" value="HOME" class="hidden peer" {% if address.address_type == 'HOME' %}checked{% endif %}>
            <div class="flex items-center justify-center gap-2 p-3 rounded-xl border-2 border-slate-100 peer-checked:border-violet-600 peer-checked:bg-violet-50 peer-checked:text-violet-700 font-extrabold text-[10px] transition">
              <i class="fa-solid fa-house"></i> Home
            </div>
          </label>
          <label class="flex-1 cursor-pointer">
            <input type="radio" name="address_type" value="WORK" class="hidden peer" {% if address.address_type == 'WORK' %}checked{% endif %}>
            <div class="flex items-center justify-center gap-2 p-3 rounded-xl border-2 border-slate-100 peer-checked:border-violet-600 peer-checked:bg-violet-50 peer-checked:text-violet-700 font-extrabold text-[10px] transition">
              <i class="fa-solid fa-briefcase"></i> Work
            </div>
          </label>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row gap-3 pt-4">
        <button type="submit" class="flex-1 violet-gradient text-white py-4 rounded-2xl font-extrabold shadow-xl shadow-violet-200 hover:shadow-violet-400 transition active:scale-95">
          Save Changes
        </button>
        <a href="{% url 'address' %}" class="flex-1 text-center py-4 rounded-2xl font-extrabold bg-slate-50 text-slate-700 hover:bg-slate-100 transition">
          Cancel
        </a>
      </div>
    </form>
  </div>
</main>
{% endblock %}
