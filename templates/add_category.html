<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Category</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f4f1ff;
    font-family:Segoe UI;
    color:#1a1a1a;
}

/* ================= SIDEBAR ================= */

.sidebar{
    height:100vh;
    width:250px;
    background:linear-gradient(180deg,#1a0033,#3b0a75);
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar h4{
    font-weight:bold;
    color:#c084fc;
}

.sidebar a{
    display:block;
    color:#d1c4ff;
    text-decoration:none;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    transition:0.3s;
}

.sidebar a:hover,
.sidebar a.active{
    background:linear-gradient(135deg,#7c3aed,#a855f7);
    color:white;
}

/* ================= MAIN ================= */

.main-content{
    margin-left:270px;
    padding:40px;
}

/* ================= CARD ================= */

.card{
    border-radius:16px;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(12px);
    border:1px solid rgba(139,92,246,0.2);
    box-shadow:0 10px 30px rgba(139,92,246,0.15);
}

/* ================= BUTTON ================= */

.btn-primary{
    background:linear-gradient(135deg,#7c3aed,#a855f7);
    border:none;
    box-shadow:0 5px 15px rgba(139,92,246,0.3);
}

.btn-primary:hover{
    background:linear-gradient(135deg,#6d28d9,#9333ea);
}

/* ================= SECONDARY BUTTON ================= */

.btn-secondary{
    background:#ede9fe;
    border:none;
    color:#4c1d95;
}

.btn-secondary:hover{
    background:#ddd6fe;
    color:#4c1d95;
}

/* ================= INPUT ================= */

.form-control{
    border-radius:12px;
    border:1px solid #e0d4ff;
    background:#faf7ff;
}

.form-control:focus{
    border-color:#8b5cf6;
    box-shadow:0 0 0 0.2rem rgba(139,92,246,0.25);
    background:white;
}

/* ================= LABEL ================= */

.form-label{
    font-weight:600;
    color:#4c1d95;
}

/* ================= ALERT ================= */

.alert-danger{
    background:#fef2f2;
    border:none;
    color:#dc2626;
}

</style>
</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4 class="mb-4">CARTIVO</h4>

<a href="{% url 'admin_index' %}"
class="flex items-center gap-4 bg-blue-800 text-white p-4 rounded-2xl font-bold text-sm">

<i class="fa-solid fa-grid-2"></i>
Infrastructure

</a>




<a href="{% url 'category' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-layer-group"></i>
ManageCategories

</a>


<a href="{% url 'subcategory' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-sitemap"></i>
Manage Sub Categories

</a>


<a href="{% url 'offer_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-tags"></i>
Manage Discount

</a>


<a href="{% url 'discount_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-percent"></i>
Manage coupon

</a>


<a href="{% url 'coupon_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-ticket"></i>
Manage Offer

</a>

<a href="{% url 'coupon_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-ticket"></i>
Offer Discount

</a>

<a href="{% url 'coupon_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">
<i class="fa-solid fa-ticket"></i>
Product Offer

</a>

<a href="{% url 'coupon_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-ticket"></i>
CategoryOffer

</a>

<a href="{% url 'coupon_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-ticket"></i>
Product Discount

</a>

<a href="{% url 'coupon_view' %}"
class="flex items-center gap-4 hover:bg-blue-900 p-4 rounded-2xl font-bold text-sm text-slate-300 transition">

<i class="fa-solid fa-ticket"></i>
Seller Management

</a>

</div>


<!-- Main Content -->

<div class="main-content">

<div class="container-fluid">

<div class="card p-4">

<h3 class="mb-4">Add New Category</h3>

{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<form method="post">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Category Name</label>

<input type="text"
class="form-control"
name="name"
required>

</div>

<div class="mb-3">

<label class="form-label">Description</label>

<textarea
class="form-control"
name="description"
required></textarea>

</div>

<button type="submit" class="btn btn-primary">
Save Category
</button>

<a href="{% url 'category' %}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
